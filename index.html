<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>2画面レイアウト</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: sans-serif;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .left {
      width: 80%;
      background-color: black;
    }

    .right {
      width: 20%;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #ccc;
    }

    .links {
      padding: 10px;
      background-color: #f5f5f5;
    }

    .links ul {
      margin: 0;
      padding-left: 18px;
    }

    .links li {
      margin-bottom: 8px;
      font-size: 13px;
    }

    .links a {
      color: #0066cc;
      text-decoration: none;
      word-break: break-all;
    }

    .links a:hover {
      text-decoration: underline;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 左画面：黒 -->
    <div class="left"></div>

    <!-- 右画面 -->
    <div class="right">
      <!-- リンク一覧 -->
      <div class="links">
        <ul>
          <li>
            <a href="https://google.com"
               target="contentFrame">
              Google
            </a>
          </li>
          <li>
            <a href="https://yahoo.co.jp"
               target="contentFrame">
              Yahoo
            </a>
          </li>
          <li>
            <a href="https://youtube.com"
               target="contentFrame">
              Youtube
            </a>
          </li>
        </ul>
      </div>

      <!-- 表示エリア -->
      <iframe name="contentFrame"></iframe>
    </div>
  </div>
</body>
</html>
